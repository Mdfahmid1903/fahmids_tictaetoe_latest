<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><line x1='2' y1='10' x2='9' y2='18' stroke='%23b0b8c1' stroke-width='3' stroke-linecap='round'/><line x1='9' y1='7' x2='2' y2='18' stroke='%23b0b8c1' stroke-width='3' stroke-linecap='round'/><circle cx='16' cy='13' r='5.5' fill='none' stroke='%23c9922a' stroke-width='3'/><line x1='23' y1='7' x2='30' y2='18' stroke='%23b0b8c1' stroke-width='3' stroke-linecap='round'/><line x1='30' y1='7' x2='23' y2='18' stroke='%23b0b8c1' stroke-width='3' stroke-linecap='round'/></svg>">
</head>

<body>
 <div class="msg-container hide"><p id="msg">Winner!</p>
<button id="newbtn">New game!</button></div>
    <main>
        <h1> Tic Tac Toe</h1>
    
    <!-- ✅ এটা add করো -->
    <div class="difficulty">
        <button id="easybtn" class="active" onclick="setDifficulty('easy')">Easy</button>
        <button id="hardbtn" onclick="setDifficulty('hard')">Hard</button>
    </div>
        
        <div class="container">

            

            <div class="game">

                <button class="box" id="box1"></button>
                <button class="box" id="box2"></button>
                <button class="box" id="box3"></button>
                <button class="box" id="box4"></button>
                <button class="box" id="box5"></button>
                <button class="box" id="box6"></button>
                <button class="box" id="box7"></button>
                <button class="box" id="box8"></button>
                <button class="box" id="box9"></button>
            </div>

        </div>
        <button id="resetbtn">Reset the game!</button>
    </main>



    <script src="/app.js"></script>

</body>

</html>
